<!DOCTYPE html>
<html>
<head>
    <title>Cleanup Duplicates</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Cleaning Duplicates...</h1>
    <div id="status">Wait...</div>
    <script>
        const SUPABASE_URL = 'https://hqarozktuvzrzhfhhjbd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxYXJvemt0dXZ6cnpoZmhoamJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NjQ3MjgsImV4cCI6MjA5MDM0MDcyOH0.f-JXg-R5cvyxvgNc3NvjO-aNjr706JrKkSqzNB1T6T0';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function cleanup() {
            const statusDiv = document.getElementById('status');
            try {
                const { data: products, error } = await sbClient.from('products').select('id, name');
                if (error) throw error;

                const seen = new Set();
                const toDelete = [];
                products.forEach(p => {
                    if (seen.has(p.name)) {
                        toDelete.push(p.id);
                    } else {
                        seen.add(p.name);
                    }
                });

                if (toDelete.length > 0) {
                    const { error: delError } = await sbClient.from('products').delete().in('id', toDelete);
                    if (delError) throw delError;
                    statusDiv.innerText = "SUCCESS! Deleted " + toDelete.length + " duplicates.";
                } else {
                    statusDiv.innerText = "No duplicates found.";
                }
            } catch (e) {
                console.error(e);
                statusDiv.innerText = "Error: " + e.message;
            }
        }
        cleanup();
    </script>
</body>
</html>
